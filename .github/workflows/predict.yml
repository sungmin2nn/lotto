name: 로또 예측 자동 실행

on:
  schedule:
    - cron: '0 0 * * 0'   # 일요일 09:00 KST (UTC 00:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 진화 엔진 실행 (백테스팅 + 예측)
        run: python evolution_engine.py

      - name: 결과 커밋 & 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add backtest_results.json dashboard.html
          git diff --staged --quiet || git commit -m "🎯 예측 업데이트 $(date +'%Y-%m-%d')"
          git push
